<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Foglalás</title>
    <nav>
      <img src="" alt="" />
      <h3>TravelApp</h3>
      <button>Kezdőlap</button>
      <button>Ajánlatok listája</button>
      <button>Foglalás</button>
    </nav>
  </head>
  <body>
    <h1>Utazás foglalása</h1>
    <h6>1. feladat: reszponzív űrlap + DEMO mentés (adatbázis nélkül)</h6>
    <form>
      <div>
        <label for="">Utazási csomag kiválasztása</label>
        <select class="form-select" aria-label="Default select example">
          <option selected>Válasszon csomagot...</option>
          <option>
            Görög nyár - Santorini, 2025-07-10 (7 éj, 285 000 Ft/fő)
          </option>
          <option>
            Toscana körutazás - Firenze, 2025-08-03 (5 éj, 198 000 Ft/fő)
          </option>
          <option>
            Barcelonai hétvége - Barcelona, 2025-09-19 (3 éj, 142 000 Ft/fő)
          </option>
          <option>Dubaji fény - Dubai, 2025-11-14 (6 éj, 520 000 Ft/fő)</option>
          <option>
            Prágai városnézés - Prága, 2025-10-04 (4 éj, 118 000 Ft/fő)
          </option>
        </select>
      </div>
      <div>
        <label for="">Foglaló neve</label>
        <input type="text" name="" id="" />
      </div>
      <div>
        <label for="">E-mail cím</label>
        <input type="email" name="" id="" />
        <label for="">Telefonszám</label>
        <input type="text" name="" id="" />
      </div>
      <div>
        <label for="">Utazók száma</label>
        <input type="number" name="" id="" max="10" min="1" />
        <label for="">Szoba típusa</label>
        <select class="form-select" aria-label="Default select example">
          <option selected>Válasszon szobatípust...</option>
          <option>Egyágyas szoba</option>
          <option>Kétágyas szoba</option>
          <option>Franciaágyas szoba</option>
          <option>Apartman</option>
          <option>Lakosztály</option>
        </select>
      </div>
      <div>
        <label for="">Ellátás</label>
        <select class="form-select" aria-label="Default select example">
          <option selected>Open this select menu</option>
          <option>Csak szállás (RO)</option>
          <option>Reggeli (BB)</option>
          <option>Félpanzió (HB)</option>
          <option>Teljes panzió (FB)</option>
          <option>All inclusive (AI)</option>
        </select>
      </div>
      <div>
        <label for="">Különleges kérés (opcionális)</label>
        <input type="text" name="" id="" />
      </div>

      <button>Foglalás elküldése</button>
    </form>
  </body>
</html>
